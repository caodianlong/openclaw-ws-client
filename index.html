<!doctype html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenClaw Dashboard</title>
  
  <!-- Tailwind CSS & Plugins -->
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              soft: '#fff1ea',
              DEFAULT: '#ff7442',
              strong: '#e65a2b',
            }
          }
        }
      }
    }
  </script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Marked.js -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Custom Styles (minimal) -->
  <link rel="stylesheet" href="./src/css/styles.css">
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 flex h-screen overflow-hidden antialiased">
  
  <!-- Sidebar -->
  <aside class="w-full md:w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col z-20 flex-shrink-0 hidden md:flex">
    <div class="p-5 flex items-center gap-3 border-b border-slate-200 dark:border-slate-800">
      <div class="w-8 h-8 rounded-lg bg-brand flex items-center justify-center text-white shadow-sm">
        <i class="fa-solid fa-claw"></i>
      </div>
      <h1 class="text-lg font-bold tracking-tight">OpenClaw</h1>
    </div>
    
    <div class="p-4 flex-1 overflow-y-auto custom-scrollbar">
      <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3 px-2">Sessions</h2>
      <div id="session-list" class="space-y-1">
        <!-- Sessions rendered here -->
        <div class="px-2 py-2 text-sm text-slate-500 italic">Loading sessions...</div>
      </div>
    </div>
    
    <div class="p-4 border-t border-slate-200 dark:border-slate-800">
      <button id="settings-btn" class="w-full flex items-center gap-3 px-3 py-2 text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">
        <i class="fa-solid fa-gear"></i>
        <span>Connection Settings</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col min-w-0 bg-slate-50/50 dark:bg-slate-950">
    <!-- Header -->
    <header class="h-14 px-4 border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md flex items-center justify-between sticky top-0 z-10">
      
      <!-- Mobile Menu Toggle (stub) & Status -->
      <div class="flex items-center gap-3">
        <div id="status-btn" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 cursor-pointer hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
          <span id="status-dot" class="w-2 h-2 rounded-full bg-slate-400"></span>
          <span class="text-xs font-semibold uppercase tracking-wide">Status: <span id="status-text-header">Idle</span></span>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="flex items-center gap-2">
        <button id="theme-toggle-btn" class="w-8 h-8 rounded-full flex items-center justify-center text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" title="Toggle Theme">
          <i class="fa-solid fa-moon dark:hidden"></i>
          <i class="fa-solid fa-sun hidden dark:block"></i>
        </button>
        
        <div class="w-px h-4 bg-slate-300 dark:bg-slate-700 mx-1"></div>
        
        <button id="poll-toggle-btn" class="flex items-center gap-2 px-3 py-1.5 text-sm font-medium rounded-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
          <span id="poll-dot" class="w-2 h-2 rounded-full bg-slate-300"></span>
          <span class="hidden sm:inline">Auto Refresh</span>
        </button>
        
        <button id="copy-frames-btn" class="w-8 h-8 rounded-full flex items-center justify-center text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" title="Copy Raw Frames">
          <i class="fa-solid fa-copy"></i>
        </button>
      </div>
    </header>

    <!-- Chat Workspace -->
    <section class="flex-1 flex flex-col min-h-0 relative">
      <!-- Chat Header -->
      <div class="px-5 py-3 flex items-center justify-between bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 shadow-sm z-10">
        <div>
          <h3 class="text-base font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2" id="history-summary">
            No active session
          </h3>
          <div class="flex items-center gap-2 mt-1">
            <span id="session-model" class="text-[10px] px-1.5 py-0.5 rounded text-slate-500 bg-slate-100 dark:bg-slate-800 font-medium hidden">Unknown Model</span>
            <p class="text-xs text-slate-500" id="history-subtitle">Live conversation history</p>
          </div>
        </div>
        
        <div class="hidden sm:block w-32 h-10">
          <canvas id="traffic-chart"></canvas>
        </div>
      </div>

      <!-- Chat History -->
      <div id="history-list" class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6 custom-scrollbar">
        <!-- Messages rendered here -->
        <div class="flex flex-col items-center justify-center h-full text-center space-y-3 opacity-50">
          <i class="fa-solid fa-message-dots text-3xl text-slate-400"></i>
          <p class="text-sm">Select a session from the sidebar to view history</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Settings Modal -->
  <div id="settings-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
    <div class="absolute inset-0 bg-slate-900/50 backdrop-blur-sm" data-close-modal="settings"></div>
    <div class="relative w-full max-w-md bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 overflow-hidden">
      <div class="px-6 py-4 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center">
        <h3 class="text-base font-bold">Gateway Connection</h3>
        <button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" data-close-modal="settings">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="p-6 space-y-4">
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-wide">Gateway URL</label>
          <input id="gateway-url" type="text" class="w-full px-3 py-2 text-sm rounded-lg bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:border-brand focus:ring-1 focus:ring-brand outline-none transition-all" placeholder="ws://127.0.0.1:18789/ws">
        </div>
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-wide">Access Token</label>
          <input id="gateway-token" type="password" class="w-full px-3 py-2 text-sm rounded-lg bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:border-brand focus:ring-1 focus:ring-brand outline-none transition-all" placeholder="Enter token...">
        </div>
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-wide">Permissions (Scopes)</label>
          <input id="gateway-scopes" type="text" class="w-full px-3 py-2 text-sm rounded-lg bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:border-brand focus:ring-1 focus:ring-brand outline-none transition-all" value="operator.read,operator.write">
        </div>
        
        <div class="pt-4 flex flex-col gap-2">
          <button id="connect-btn" class="w-full py-2.5 bg-brand hover:bg-brand-strong text-white text-sm font-bold rounded-lg transition-colors">Connect Now</button>
          <div class="grid grid-cols-2 gap-2">
            <button id="save-settings-btn" class="py-2 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-sm font-semibold rounded-lg transition-colors">Save Local</button>
            <button id="disconnect-btn" class="py-2 text-red-600 bg-red-50 hover:bg-red-100 dark:text-red-400 dark:bg-red-900/20 dark:hover:bg-red-900/40 text-sm font-semibold rounded-lg transition-colors">Disconnect</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Status Modal -->
  <div id="status-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
    <div class="absolute inset-0 bg-slate-900/50 backdrop-blur-sm" data-close-modal="status"></div>
    <div class="relative w-full max-w-sm bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 overflow-hidden">
      <div class="px-6 py-4 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center">
        <h3 class="text-base font-bold">System Status</h3>
        <button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" data-close-modal="status">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="p-6">
        <div class="flex items-center gap-3 mb-6">
          <div id="status-dot-detail" class="w-3 h-3 rounded-full bg-slate-400"></div>
          <div>
            <h4 id="status-text" class="text-xl font-bold uppercase tracking-tight leading-none">Idle</h4>
            <p id="status-detail" class="text-xs text-slate-500 mt-1">Not connected to gateway</p>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-0.5">Protocol</span>
            <strong id="protocol-version" class="text-sm font-mono text-slate-700 dark:text-slate-300">-</strong>
          </div>
          <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-0.5">Frames</span>
            <strong id="frame-count" class="text-sm font-mono text-slate-700 dark:text-slate-300">0</strong>
          </div>
          <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700 col-span-2 overflow-hidden">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-0.5">Device ID</span>
            <strong id="device-id" class="text-[11px] font-mono text-slate-600 dark:text-slate-400 break-all truncate block">-</strong>
          </div>
          <div class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700 col-span-2 overflow-hidden">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-0.5">Conn ID</span>
            <strong id="conn-id" class="text-[11px] font-mono text-slate-600 dark:text-slate-400 break-all truncate block">-</strong>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="./src/js/app.js"></script>
</body>
</html>
