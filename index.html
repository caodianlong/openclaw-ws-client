<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenClaw Browser Client</title>
  <link rel="stylesheet" href="./src/css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <section class="panel">
        <div class="panel-title">Sessions</div>
        <div id="session-list" class="session-list"></div>
      </section>
    </aside>

    <main class="workspace">
      <header class="workspace-header">
        <div class="badge">OpenClaw</div>
        <div class="toolbar">
          <button id="poll-toggle-btn" class="ghost-btn">
            <span id="poll-dot" class="toggle-dot off"></span>
            <span>自动刷新</span>
          </button>
          <button id="status-btn" class="icon-btn" aria-label="状态">
            <span id="status-dot" class="status-dot idle"></span>
            <span class="icon-btn-text">状态</span>
          </button>
          <button id="settings-btn" class="ghost-btn">设置</button>
        </div>
      </header>

      <section class="history-panel">
        <div class="stream-header">
          <div class="stream-title">
            <strong>Chat History</strong>
            <button id="copy-frames-btn" class="text-btn" aria-label="复制原始 WebSocket Frames">Copy</button>
          </div>
          <span id="history-summary">未选择会话</span>
        </div>
        <div id="history-list" class="history-list"></div>
      </section>
    </main>
  </div>

  <div id="settings-modal" class="modal hidden">
    <div class="modal-backdrop" data-close-modal="settings"></div>
    <section class="modal-card">
      <div class="modal-header">
        <strong>Connection</strong>
        <button class="text-btn" data-close-modal="settings">Close</button>
      </div>
      <label class="field">
        <span>Gateway URL</span>
        <input id="gateway-url" placeholder="ws://127.0.0.1:18789/ws">
      </label>
      <label class="field">
        <span>Token</span>
        <input id="gateway-token" placeholder="OPENCLAW_GATEWAY_TOKEN">
      </label>
      <label class="field">
        <span>Scopes</span>
        <input id="gateway-scopes" placeholder="operator.read,operator.write">
      </label>
      <div class="button-row">
        <button id="save-settings-btn" class="ghost-btn">保存</button>
        <button id="connect-btn" class="primary-btn">Connect</button>
        <button id="disconnect-btn" class="ghost-btn">Disconnect</button>
      </div>
      <p class="hint">
        首次访问可通过 URL 参数传入：
        <code>?gateway=ws://127.0.0.1:18789/ws&token=xxx</code>
      </p>
    </section>
  </div>

  <div id="status-modal" class="modal hidden">
    <div class="modal-backdrop" data-close-modal="status"></div>
    <section class="modal-card">
      <div class="modal-header">
        <strong>Status</strong>
        <button class="text-btn" data-close-modal="status">Close</button>
      </div>
      <div class="status-card">
        <div class="status-row">
          <span id="status-dot-detail" class="status-dot idle"></span>
          <strong id="status-text">idle</strong>
        </div>
        <div id="status-detail" class="status-detail">未连接</div>
        <div class="meta-grid">
          <div>
            <span>Protocol</span>
            <strong id="protocol-version">-</strong>
          </div>
          <div>
            <span>Conn ID</span>
            <strong id="conn-id">-</strong>
          </div>
          <div>
            <span>Device ID</span>
            <strong id="device-id">-</strong>
          </div>
          <div>
            <span>Frames</span>
            <strong id="frame-count">0</strong>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="./src/js/app.js"></script>
</body>
</html>
